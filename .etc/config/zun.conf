[websocket_proxy]
# Keep your existing host/port
wsproxy_host = {{ api_interface_address }}
wsproxy_port = 6784

# The base_url should be the Public VIP or FQDN users type in the browser
base_url = ws://192.168.101.10:6784
ssl_only = false
# ALLOWED ORIGINS: Add the VIP and all 3 Controller IPs
# Replace these IPs with your actual Controller 1, 2, and 3 IPs
websocket_allowed_origins = vip.public.cloud:443, 192.168.101.10:443, 192.168.101.12:443, 192.168.101.13:443, 192.168.101.14:443, 192.168.101.12:6784, 192.168.101.13:6784, 192.168.101.14:6784, 192.168.101.12:80, 192.168.101.13:80, 192.168.101.14:80, 192.168.101.10:80, 192.168.103.10:80
