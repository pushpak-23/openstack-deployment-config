[DEFAULT]
# Scale workers to handle 200+ tenants and frequent secret lookups
# Match to a portion of your 80 cores
workers = 40

[database]
# Increase pool size from 1 to handle concurrent requests
max_pool_size = 100
max_overflow = 50
# Increase recycle time to 1 hour to stop constant TCP handshakes
connection_recycle_time = 3600

[keystone_authtoken]
# Use the internal memcached cluster for faster token validation
memcached_servers = 192.168.101.12:11211,192.168.101.13:11211,192.168.101.14:11211
# Enable caching to reduce Keystone API calls
cache = true

[oslo_messaging_rabbit]
# Decouple heartbeats to prevent RPC timeouts under high 2000+ VM load
heartbeat_in_pthread = true

[oslo_concurrency]
# Ensure the lock path is on a high-speed disk (SSD/SDA)
lock_path = /var/lib/barbican/tmp
