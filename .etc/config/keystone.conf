[DEFAULT]
public_workers = 64
admin_workers = 8
# Increase to handle the high volume of green threads
executor_thread_pool_size = 1024

[database]
# Balanced for 64 workers (64 * 20 = 1280 conns per node)
max_pool_size = 20
max_overflow = 50
connection_recycle_time = 3600

[cache]
enabled = true
backend = dogpile.cache.memcached
# Use the VIP for single-source-of-truth caching
#memcache_servers = 192.168.101.10:11211
expiration_time = 600
# Connection pool to memcached
memcache_pool_maxsize = 1000
memcache_use_advanced_pool = True

[token]
# Enable Fernet token caching
caching = true
[identity]
# CRITICAL: Reduces CPU overhead for every API call across 200 tenants
password_hash_rounds = 4
