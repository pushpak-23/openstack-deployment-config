[DEFAULT]
disk_allocation_ratio = 2.0
# reserved_host_disk_mb = 1
# report_disks = False

# Scale down to 16 workers to eliminate CPU contention and top load spike
api_workers = 16
metadata_workers = 16

# Balance the thread pool for async greenlets alongside the 16 workers
executor_thread_pool_size = 512

[database]
# Keep pools wide open to support concurrent DB transactions smoothly
max_pool_size = 50
max_overflow = 30

[api_database]
max_pool_size = 50
max_overflow = 30

[oslo_messaging_rabbit]
# Keep connection sizing robust to match the parallelized rabbitmq tuning
rpc_conn_pool_size = 64
