#"context_is_admin": "role:admin"
#"admin_or_owner": "is_admin:True or project_id:%(project_id)s"
#"member": "role:member"

#"container:create": "rule:admin_or_owner or rule:member"
#"container:delete": "rule:admin_or_owner"
#"container:get_one": "rule:admin_or_owner or rule:member"
#"container:get_all": "rule:admin_or_owner or rule:member"
#"container:start": "rule:admin_or_owner"
#"container:stop": "rule:admin_or_owner"
context_is_admin: "role:admin"
admin_or_owner: "is_admin:True or project_id:%(project_id)s"
admin_api: "rule:context_is_admin"
deny_everybody: "!"

# Container creation and management
container:create: "rule:admin_or_owner"
container:create:image_pull_policy: "rule:admin_or_owner"
container:create:runtime: "rule:admin_or_owner"
container:create:privileged: "rule:deny_everybody"
container:create:requested_destination: "rule:context_is_admin"
container:delete: "rule:admin_or_owner"
container:delete_all_projects: "rule:context_is_admin"
container:delete_force: "rule:context_is_admin"
container:get_one: "rule:admin_or_owner"
container:get_one:host: "rule:context_is_admin"
container:get_one:image_pull_policy: "rule:admin_or_owner"

# Networking
network:attach_external_network: "rule:admin_or_owner"
