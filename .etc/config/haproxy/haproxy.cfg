global
    maxconn 100000
    # Utilize 8 threads on your 80-core CPU
    nbthread 8
    # Increase SSL cache for 200+ tenants
    tune.ssl.cachesize 100000
    # Standard Kolla settings follow...

defaults
    log global
    option redispatch
    retries 3
    # Increase timeouts for large image uploads (Glance)
    timeout http-request 30s
    timeout client 5m
    timeout server 5m
    timeout connect 10s
    maxconn 40000
