[DEFAULT]
# Scale down to 16 workers to stop CPU contention and database thrashing
api_workers = 16
rpc_workers = 16
rpc_response_timeout = 360

# Balanced thread pool size for execution threads
executor_thread_pool_size = 512

[database]
# Keep connection pools large enough to prevent serialization/starvation
max_pool_size = 50
max_overflow = 30
pool_timeout = 30

[oslo_messaging_rabbit]
# Keep messaging channels open and allow pipeline processing
rpc_conn_pool_size = 64
rabbit_qos_prefetch_count = 8

[ovn]
# CRITICAL FIX: Stops uWSGI from spinning while trying to find the OVN database leader
ovsdb_probe_interval = 60000
ovsdb_connection_timeout = 300
